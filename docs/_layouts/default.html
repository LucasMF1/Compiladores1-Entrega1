<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}" />
</head>
<body>
  <header class="page-header">
    <div class="container page-header__inner">
      <a class="brand" href="{{ '/' | relative_url }}">Compiladores 1</a>
      <nav class="page-nav">
        <a href="{{ '/' | relative_url }}">Inicio</a>
        <a href="{{ '/paginas/sobre.html' | relative_url }}">Sobre</a>
        <a href="{{ '/paginas/sprints.html' | relative_url }}">Sprints</a>
        <a href="{{ '/paginas/decisoes-tecnicas.html' | relative_url }}">Decisoes tecnicas</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <div class="container">
      <article class="doc-card markdown-body">
        <a class="back-link" href="{{ '/' | relative_url }}">Voltar para a pagina inicial</a>
        {{ content }}
      </article>
    </div>
  </main>
</body>
</html>
